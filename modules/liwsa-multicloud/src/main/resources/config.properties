# LIWSA Multi-Cloud Framework -- simulation configuration.
# Every key is optional; anything omitted falls back to SimulationConfig's
# built-in default (shown below as the value already set on each line).
# Loaded via org.liwsa.multicloud.config.ConfigLoader.

# --- Simulation ---
simulation.randomSeed=42
simulation.numTasks=1000
# Path to a task workload file. Leave blank to generate a synthetic workload instead.
simulation.taskWorkloadPath=
# One of: csv | xml | json  (see org.liwsa.multicloud.io.TaskWorkloadReader for the schema)
simulation.taskWorkloadFormat=csv
simulation.resultsOutputDir=results
# Comma-separated task counts for ScalabilityDemo's low-to-high load sweep;
# one combined CSV row per algorithm per count (results/scalability-sweep.csv).
simulation.taskCountSweep=100,1000,10000,100000

# --- Algorithm (LIWSA-Task / LIWSA-Task-ML / WOA / RL-GA-lite all share these) ---
algorithm.populationSize=30
algorithm.generationCount=100
# Independent runs per algorithm in ExperimentRunner (mean/min/max/stddev/95% CI).
algorithm.numExperimentRuns=30

# --- Cloud provisioning ---
# How many VM instances of each catalog VM type (see CloudProviderPresets) to
# provision per cloud. Per-cloud host counts/capacity/pricing are presently
# defined in code (CloudProviderPresets), not here -- see that class's Javadoc.
cloud.instancesPerVmType=4

# --- Broker ---
# Seconds between MultiCloudBroker utilisation samples; -1 disables periodic monitoring.
broker.monitoringPeriod=-1
